<!DOCTYPE html>
<html>
<head>
  <title>Basic Calculator</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background-color: #f2f2f2;
    }

    h2 {
      color: #333;
    }

    #display {
      width: 200px;
      height: 40px;
      font-size: 20px;
      text-align: right;
      margin-bottom: 10px;
      border: 1px solid #333;
      border-radius: 5px;
      padding-right: 5px;
      background-color: #fff;
    }

    .btn {
      width: 45px;
      height: 45px;
      font-size: 16px;
      margin: 3px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
    }

    .btn:hover {
      background-color: #45a049;
    }

    .operator {
      background-color: #ff9800;
    }

    .operator:hover {
      background-color: #e68900;
    }

    .equal {
      background-color: #2196F3;
    }

    .equal:hover {
      background-color: #0b7dda;
    }

    .clear {
      background-color: #f44336;
    }

    .clear:hover {
      background-color: #d32f2f;
    }
  </style>

</head>
<body>

  <h2>Basic Calculator</h2>

  <input type="text" id="display" disabled><br>

  <button class="btn" onclick="add('7')">7</button>
  <button class="btn" onclick="add('8')">8</button>
  <button class="btn" onclick="add('9')">9</button>
  <button class="btn operator" onclick="add('/')">/</button><br>

  <button class="btn" onclick="add('4')">4</button>
  <button class="btn" onclick="add('5')">5</button>
  <button class="btn" onclick="add('6')">6</button>
  <button class="btn operator" onclick="add('*')">*</button><br>

  <button class="btn" onclick="add('1')">1</button>
  <button class="btn" onclick="add('2')">2</button>
  <button class="btn" onclick="add('3')">3</button>
  <button class="btn operator" onclick="add('-')">-</button><br>

  <button class="btn" onclick="add('0')">0</button>
  <button class="btn" onclick="add('.')">.</button>
  <button class="btn equal" onclick="calculate()">=</button>
  <button class="btn operator" onclick="add('+')">+</button><br>

  <button class="btn clear" onclick="clearDisplay()">C</button>

  <script>
    function add(value) {
      document.getElementById("display").value += value;
    }

    function calculate() {
      try {
        document.getElementById("display").value =
          eval(document.getElementById("display").value);
      } catch {
        document.getElementById("display").value = "Error";
      }
    }

    function clearDisplay() {
      document.getElementById("display").value = "";
    }
  </script>

</body>
</html>
